<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light" />
  <!-- Embeddable as an iframe (e.g. Google Sites); harmless when served directly. -->
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
  <meta name="description" content="Prototype of a school Trip Absence Workflow. Fictional data, no backend — runs entirely in the browser." />
  <title>Trip Absence Workflow — Prototype</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <a class="skip-link" href="#view">Skip to content</a>

  <!-- Persistent fictional-data notice -->
  <div class="banner" role="note">
    <span class="banner__tag">Prototype</span>
    <span class="banner__text">All data is fictional. Nothing is emailed and no record is written to any external system — the entire workflow runs in your browser.</span>
  </div>

  <!-- Demo-only control bar -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar__inner">
      <div class="toolbar__row">
        <div class="toolbar__group">
          <span class="toolbar__label" id="view-label">View</span>
          <div class="seg" role="group" aria-labelledby="view-label" id="view-seg">
            <button type="button" class="seg__btn" data-view="director">Director</button>
            <button type="button" class="seg__btn" data-view="teacher">Teacher</button>
            <button type="button" class="seg__btn" data-view="student">Student</button>
            <button type="button" class="seg__btn" data-view="outbox">Outbox</button>
          </div>
        </div>

        <div class="toolbar__group" id="viewing-as-group" hidden>
          <label class="toolbar__label" for="viewing-as">Viewing as</label>
          <select id="viewing-as" class="select select--inline"></select>
        </div>

        <div class="toolbar__group toolbar__right">
          <button type="button" id="reset-demo" class="btn btn--sm btn--ghost btn--danger">Reset demo</button>
        </div>
      </div>

      <div class="toolbar__row toolbar__row--stages">
        <span class="toolbar__label">Stage</span>
        <span id="stage-readout" class="stage-readout">Not started</span>
        <div class="stage-buttons" id="stage-buttons" role="group" aria-label="Advance the demo clock"></div>
      </div>
    </div>
  </div>

  <main class="container">
    <div id="view" tabindex="-1"><!-- rendered by app.js --></div>
  </main>

  <footer class="app-footer">
    <p>Trip Absence Workflow · fictional-data prototype · runs client-side only.
       <a href="./README.md">About this demo</a></p>
  </footer>

  <!-- Overlays -->
  <div id="modal-root"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Relative script paths so the app works at any mount path / from file://. -->
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
